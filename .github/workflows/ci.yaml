name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter-back
        with:
          filters: |
            src: ['backend/**']
            
      - if: steps.filter-back.outputs.src == 'true'
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: steps.filter-back.outputs.src == 'true'
        name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            matias1210/rhtech-backend:${{ github.sha }}
            matias1210/rhtech-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter-front
        with:
          filters: |
            src: ['frontend/**']
            
      - if: steps.filter-front.outputs.src == 'true'
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: steps.filter-front.outputs.src == 'true'
        name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            matias1210/rhtech-frontend:${{ github.sha }}
            matias1210/rhtech-frontend:latest

      - if: steps.filter-front.outputs.src == 'true'
        name: Update image tag in deployment
        run: |
          sed -i "s|matias1210/rhtech-frontend:.*|matias1210/rhtech-frontend:${{ github.sha }}|g" k8s/base/frontend/deployment.yaml
          
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add k8s/base/frontend/deployment.yaml
            git commit -m "chore: update frontend image to ${{ github.sha }}"
            git push
          else
            echo "Nenhuma mudança no deployment.yaml, pulando push."
          fi
