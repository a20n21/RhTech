name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: seu-usuario/rhtech-backend:${{ github.sha }}

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: rhtech-backend:.*|image: seu-usuario/rhtech-backend:${{ github.sha }}|g" k8s/base/backend/deployment.yaml
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/base/backend/deployment.yaml
          git commit -m "chore: update backend image to ${{ github.sha }}"
          git push
