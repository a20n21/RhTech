name: CI Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write # Alterado para 'write' para permitir que o bot faça commit

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Necessário para permitir o push de volta

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: matias1210/rhtech-backend:${{ github.sha }}

      - name: Update Kubernetes Manifest
        run: |
          cd k8s/overlays/dev
          kustomize edit set image matias1210/rhtech-backend:${{ github.sha }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git commit -m "chore: update image to ${{ github.sha }}"
          git push
