apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

images:
  - name: matias1210/rhtech-backend # O nome da imagem base que está no seu Deployment
    newName: matias1210/rhtech-backend # O nome do repositório no Docker Hub
    newTag: latest # O pipeline vai sobrescrever isso

patches:
  - target:
      kind: Deployment
      name: backend-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
