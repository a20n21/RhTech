apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: rhtech-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rhtech-backend
  template:
    metadata:
      labels:
        app: rhtech-backend
        version: v1 
    spec:
      containers:
      - name: backend
        image: rhtech_backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15       
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: DB_HOST
          value: "rhtech-db"

