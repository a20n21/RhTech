apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-mesh
  namespace: istio-system
  labels:
    release: kube-prometheus-stack 
spec:
  selector:
    matchLabels:
      app: istio-ingressgateway 
  namespaceSelector:
    matchNames:
      - istio-system
  endpoints:
  - port: status-port  
    interval: 15s